<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Cliché Killer</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <div class="container">
      <div id="main-view">
        <div class="header">
          <div class="logo">
            <span class="ghost-icon">👻</span>
            <span>Cliché Killer</span>
          </div>
          <button id="settings-btn" class="btn-icon" title="API Settings">
            ⚙️
          </button>
        </div>

        <p class="hero-text">
          Restore your authentic voice. Remove AI-generated fluff from your writing instantly.
        </p>

        <button id="scan" class="btn btn-primary">
          <span id="scan-text">Scan Document</span>
          <div id="loader" class="loader hidden"></div>
        </button>

        <div id="results" class="card hidden">
          <div class="score-card">
            <div class="score-label">Originality Health</div>
            <div id="health-score" class="score-value">0</div>
          </div>
          
          <div class="stats-bar">
            <div class="dot"></div>
            <span id="stats">0 clichés detected</span>
          </div>

          <ul id="cliche-list" class="cliche-list">
            <!-- Clichés will be injected here -->
          </ul>

          <a href="http://localhost:3000/analyze" target="_blank" class="footer-link">
            Open Full Editor →
          </a>
        </div>

        <div id="status" class="status-msg"></div>
      </div>

      <div id="settings-view" class="hidden">
        <div class="header">
          <div class="logo">Settings</div>
          <button id="back-btn" class="btn-icon">
            ←
          </button>
        </div>
        
        <div class="card">
          <div class="input-group">
            <label class="label">API Key</label>
            <input type="password" id="api-key-input" class="input" placeholder="ck_live_xxxxxxxxxxxxxxxx">
          </div>
          <button id="save-key" class="btn btn-primary">Save Key</button>
          <p class="hero-text" style="font-size: 11px; margin-top: 12px; margin-bottom: 0;">
            Get your key from the <a href="http://localhost:3000/dashboard" target="_blank" style="color: var(--primary); text-decoration: none;">dashboard</a>.
          </p>
        </div>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
